<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_title">欢迎使用 Lumno！| Lumno 聚焦搜索&新标签页</title>
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <link rel="stylesheet" href="./assets/remixicon.css" />
    <style>
      @font-face {
        font-family: "Open Sans";
        src: url("./assets/OpenSans-VariableFont-wdth-wght.ttf") format("truetype");
        font-style: normal;
        font-weight: 300 800;
        font-display: swap;
      }

      :root {
        --bg: #fafafa;
        --text-main: #2d3138;
        --text-sub: #898989;
        --card-text-sub: rgba(0, 0, 0, 0.6);
        --card-grad-start: #ffffff;
        --card-grad-end: #f9f9f9;
        --border-soft: #e2e2e2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text-main);
        font-family: "Open Sans", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      }

      .onboarding {
        min-height: 100vh;
        display: flex;
        overflow: hidden;
      }

      .left-pane {
        position: relative;
        width: 40%;
        min-width: 560px;
        padding-left: clamp(56px, 9vw, 132px);
        padding-right: 48px;
      }

      .left-main {
        position: absolute;
        left: clamp(56px, 9vw, 132px);
        right: 48px;
        top: 50%;
        transform: translateY(-50%);
        width: min(428px, calc(100% - clamp(56px, 9vw, 132px) - 48px));
        display: flex;
        flex-direction: column;
        gap: 112px;
      }

      .hero {
        width: 100%;
        opacity: 0;
        transform: translateX(-24px);
        filter: blur(6px);
        animation: x-hero-enter 620ms cubic-bezier(0.22, 1, 0.36, 1) 100ms forwards;
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: clamp(10px, 1.8vw, 24px);
      }

      .title {
        margin: 0;
        font-size: clamp(38px, 3.6vw, 44px);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: 0.2px;
        white-space: nowrap;
        background: linear-gradient(180deg, #000000 0%, #666666 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .logo-lockup {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transform: translateY(-5px);
      }

      .logo-icon-wrap {
        --logo-box: 54px;
        position: relative;
        width: var(--logo-box);
        height: var(--logo-box);
        flex: none;
        overflow: visible;
      }

      .logo-icon {
        position: absolute;
        width: calc(var(--logo-box) * 63 / 48);
        height: calc(var(--logo-box) * 69 / 48);
        left: calc(var(--logo-box) * -13 / 48);
        top: calc(var(--logo-box) * -1 / 48);
        max-width: none;
      }

      .logo-wordmark-wrap {
        --wordmark-width: 182px;
        position: relative;
        width: var(--wordmark-width);
        height: calc(var(--wordmark-width) * 43 / 165);
        flex: none;
      }

      .logo-wordmark {
        width: 100%;
        height: 100%;
        display: block;
      }

      .logo-butterfly-stage {
        position: absolute;
        left: calc(var(--wordmark-width) * 152 / 165);
        top: 6px;
        width: calc(var(--wordmark-width) * 20 / 165);
        height: calc(var(--wordmark-width) * 22 / 165);
        overflow: visible;
        transform: rotate(-4deg);
        transform-origin: 24% 77%;
      }

      .logo-butterfly {
        position: absolute;
        inset: 0;
        display: block;
      }

      .logo-butterfly-wing {
        transform-origin: 24% 77%;
      }

      .logo-butterfly-wing-back {
        opacity: 0.22;
        transform: translate(0.6px, 0.2px) rotate(12deg) scale(0.97);
        filter: blur(0.1px);
      }

      .logo-butterfly-wing-front {
        opacity: 0.34;
        transform: translate(-0.2px, 0.1px) rotate(-8deg) scale(1.01);
      }

      .logo-butterfly-path {
        opacity: 1;
      }

      .mark-svg {
        -webkit-user-drag: none;
        user-drag: none;
        user-select: none;
        -webkit-user-select: none;
        pointer-events: none;
      }

      .subtitle {
        margin: 8px 0 0;
        color: #9b9b9b;
        font-size: 17px;
        line-height: 1.45;
        letter-spacing: 0.1px;
        font-weight: 400;
      }

      .is-locale-en .subtitle {
        white-space: nowrap;
        font-size: 15px;
        letter-spacing: 0;
      }

      .is-locale-en .title {
        letter-spacing: -1px;
      }

      .shortcut-line {
        margin-top: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #3c4455;
        font-size: 18px;
        font-weight: 500;
        opacity: 0;
        transform: translateX(-24px);
        filter: blur(6px);
        animation: x-hero-enter 620ms cubic-bezier(0.22, 1, 0.36, 1) 300ms forwards;
      }

      .text-shimmer {
        position: relative;
        display: inline-block;
        background-image: linear-gradient(
          110deg,
          rgba(60, 68, 85, 0.88) 0%,
          rgba(60, 68, 85, 0.95) 30%,
          rgba(255, 255, 255, 0.12) 46%,
          rgba(255, 255, 255, 0.16) 50%,
          rgba(255, 255, 255, 0.12) 54%,
          rgba(60, 68, 85, 0.95) 70%,
          rgba(60, 68, 85, 0.88) 100%
        );
        background-size: 280% 100%;
        background-position: 140% 0;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: blur(0.25px);
      }

      .is-entered .text-shimmer {
        animation: x-text-shimmer-press 4300ms linear infinite;
      }

      .is-entered .text-shimmer-delay {
        animation: x-text-shimmer-invoke 4300ms linear infinite;
      }

      @keyframes x-text-shimmer-press {
        0% {
          background-position: 140% 0;
        }
        24% {
          background-position: -40% 0;
        }
        100% {
          background-position: -40% 0;
        }
      }

      @keyframes x-text-shimmer-invoke {
        0%,
        33.8% {
          background-position: 140% 0;
        }
        66% {
          background-position: -40% 0;
        }
        100% {
          background-position: -40% 0;
        }
      }

      @keyframes x-hero-enter {
        from {
          opacity: 0;
          transform: translateX(-24px);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
          filter: blur(0);
        }
      }

      .kbd-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      kbd {
        min-width: 38px;
        height: 30px;
        border-radius: 8px;
        border: 3px solid #000;
        padding: 0 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Open Sans", "PingFang SC", sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: #000;
        background: linear-gradient(180deg, #ededed 0%, #ffffff 100%);
        box-shadow: 0 4px 0 #000, inset 0 -1px 4px rgba(255, 255, 255, 0.33);
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      .is-entered .kbd-key-modifier {
        animation: x-kbd-press-modifier 4300ms linear infinite;
      }

      .is-entered .kbd-key-trigger {
        animation: x-kbd-press-trigger 4300ms linear infinite;
      }

      @keyframes x-kbd-press-modifier {
        0%,
        24.5%,
        100% {
          transform: translateY(0);
          background: linear-gradient(180deg, #ededed 0%, #ffffff 100%);
          box-shadow: 0 4px 0 #000, inset 0 -1px 4px rgba(255, 255, 255, 0.33);
        }
        25.2%,
        26.8% {
          transform: translateY(2px);
          background: linear-gradient(180deg, #e2e2e2 0%, #f2f2f2 100%);
          box-shadow: 0 2px 0 #000, inset 0 -1px 2px rgba(255, 255, 255, 0.2);
        }
        27.6% {
          transform: translateY(-1px);
          background: linear-gradient(180deg, #f1f1f1 0%, #ffffff 100%);
          box-shadow: 0 5px 0 #000, inset 0 -1px 4px rgba(255, 255, 255, 0.35);
        }
      }

      @keyframes x-kbd-press-trigger {
        0%,
        26.9%,
        100% {
          transform: translateY(0);
          background: linear-gradient(180deg, #ededed 0%, #ffffff 100%);
          box-shadow: 0 4px 0 #000, inset 0 -1px 4px rgba(255, 255, 255, 0.33);
        }
        27.6%,
        29.2% {
          transform: translateY(2px);
          background: linear-gradient(180deg, #e2e2e2 0%, #f2f2f2 100%);
          box-shadow: 0 2px 0 #000, inset 0 -1px 2px rgba(255, 255, 255, 0.2);
        }
        30% {
          transform: translateY(-1px);
          background: linear-gradient(180deg, #f1f1f1 0%, #ffffff 100%);
          box-shadow: 0 5px 0 #000, inset 0 -1px 4px rgba(255, 255, 255, 0.35);
        }
      }

      .actions {
        position: absolute;
        left: clamp(56px, 9vw, 132px);
        bottom: clamp(28px, 7vh, 86px);
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .pill-btn {
        min-height: 36px;
        position: relative;
        border-radius: 999px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, #ffffff 0%, #ecedef 100%);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02), inset 0 -4px 3px rgba(255, 255, 255, 0.59);
        padding: 9px 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        line-height: 1;
        font-weight: 500;
        color: #4b545f;
        text-decoration: none;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }


      .pill-btn-selected {
        box-shadow:
          0 20px 6px rgba(0, 0, 0, 0),
          0 13px 5px rgba(0, 0, 0, 0),
          0 7px 4px rgba(0, 0, 0, 0.01),
          0 3px 3px rgba(0, 0, 0, 0.02),
          0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .pill-btn-selected::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        pointer-events: none;
        box-shadow: inset 0 -4px 3px rgba(255, 255, 255, 0.59);
      }

      .pill-btn:focus-visible {
        outline: 2px solid rgba(75, 84, 95, 0.35);
        outline-offset: 2px;
      }

      @media (hover: hover) and (pointer: fine) {
        .pill-btn:hover {
          transform: translateY(-1px);
          border-color: #d2d8df;
          background: linear-gradient(180deg, #ffffff 0%, #e8ebef 100%);
          box-shadow:
            0 14px 18px rgba(0, 0, 0, 0.04),
            0 2px 3px rgba(0, 0, 0, 0.04),
            inset 0 -4px 3px rgba(255, 255, 255, 0.65);
        }

        .pill-btn.pill-btn-selected:hover {
          box-shadow:
            0 20px 6px rgba(0, 0, 0, 0),
            0 13px 5px rgba(0, 0, 0, 0),
            0 9px 6px rgba(0, 0, 0, 0.02),
            0 4px 4px rgba(0, 0, 0, 0.03),
            0 1px 2px rgba(0, 0, 0, 0.03);
        }
      }

      .pill-btn:active {
        transform: translateY(1px);
        background: linear-gradient(180deg, #ffffff 0%, #ecedef 100%);
        box-shadow:
          0 2px 5px rgba(0, 0, 0, 0.06),
          inset 0 -4px 3px rgba(255, 255, 255, 0.59);
      }

      .pill-btn.pill-btn-selected:active {
        box-shadow:
          0 6px 8px rgba(0, 0, 0, 0.06),
          0 1px 2px rgba(0, 0, 0, 0.04);
      }

      @media (prefers-reduced-motion: reduce) {
        .pill-btn {
          transition: none;
        }

        .hero,
        .shortcut-line {
          opacity: 1;
          transform: none;
          filter: none;
          animation: none;
        }

        .text-shimmer,
        .text-shimmer-delay {
          animation: none;
          background: none;
          -webkit-text-fill-color: currentColor;
        }

        .kbd-key {
          animation: none;
        }

        .logo-butterfly {
          transform: none;
          animation: none;
        }

        .logo-butterfly animate {
          display: none;
        }
      }

      .pill-btn-figma-icon {
        width: 18px;
        height: 18px;
        display: block;
      }

      .pill-btn img {
        width: 18px;
        height: 18px;
      }

      .pill-btn .ri-discord-fill,
      .pill-btn .ri-settings-6-line,
      .pill-btn .ri-github-fill {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
      }

      .lang-control {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 10;
      }

      .lang-toggle {
        width: 42px;
        min-width: 42px;
        height: 42px;
        padding: 0;
        justify-content: center;
        cursor: pointer;
      }

      .lang-toggle i {
        font-size: 20px;
        line-height: 1;
      }

      .lang-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        min-width: 180px;
        background: #fff;
        border: 1px solid #e2e2e2;
        border-radius: 12px;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
      }

      .lang-menu[hidden] {
        display: none;
      }

      .lang-option {
        width: 100%;
        border: 0;
        background: transparent;
        border-radius: 8px;
        text-align: left;
        padding: 8px 10px;
        color: #3f4650;
        font-family: inherit;
        font-size: 14px;
        cursor: pointer;
      }

      .lang-option:hover {
        background: #f3f5f7;
      }

      .lang-option.is-active {
        background: #eaf3ff;
        color: #2a5da7;
        font-weight: 600;
      }

      .right-pane {
        width: 60%;
        position: relative;
        margin: 0;
        border-radius: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .right-bg {
        position: absolute;
        inset: 0;
        background: url("./assets/frame234-bg.png") left center / cover no-repeat;
        opacity: 0.2;
      }

      .feature-grid {
        position: relative;
        width: 546px;
        height: 455px;
        filter: drop-shadow(0 7px 15px rgba(0, 0, 0, 0.02)) drop-shadow(0 28px 28px rgba(0, 0, 0, 0.02));
        transform: scale(1.08);
        transform-origin: center;
      }

      .feature-card {
        position: absolute;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        background: linear-gradient(180deg, var(--card-grad-start) 0%, var(--card-grad-end) 100%);
        transition:
          transform 340ms cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 340ms cubic-bezier(0.22, 1, 0.36, 1),
          border-color 300ms ease;
        border: 1px solid rgba(0, 0, 0, 0.03);
      }

      .feature-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        box-shadow: inset 0 -5px 8px rgba(255, 255, 255, 0.25);
      }

      @media (hover: hover) and (pointer: fine) {
        .feature-card:hover {
          transform: translateY(-4px);
          border-color: rgba(0, 0, 0, 0.06);
          box-shadow:
            0 12px 24px rgba(0, 0, 0, 0.05),
            0 4px 8px rgba(0, 0, 0, 0.03);
        }
      }

      .feature-card.is-active {
        transform: translateY(-4px);
        border-color: rgba(0, 0, 0, 0.06);
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.05),
          0 4px 8px rgba(0, 0, 0, 0.03);
      }

      .right-pane.is-manual-hover .feature-card.is-active:not(:hover) {
        transform: none;
        border-color: rgba(0, 0, 0, 0.03);
        box-shadow: none;
      }

      @media (hover: hover) and (pointer: fine) {
        .right-pane.is-manual-hover .feature-card:hover {
          transform: translateY(-4px);
          border-color: rgba(0, 0, 0, 0.06);
          box-shadow:
            0 12px 24px rgba(0, 0, 0, 0.05),
            0 4px 8px rgba(0, 0, 0, 0.03);
        }
      }

      .card-title-wrap {
        padding: 24px 22px 0;
        flex: 1 1 auto;
        min-height: 0;
      }

      .card-title {
        margin: 0;
        font-size: 16px;
        line-height: 1.3;
        color: #000;
        font-weight: 500;
      }

      .card-desc {
        margin: 4px 0 0;
        color: var(--card-text-sub);
        font-size: 13px;

      }

      .card-a-graphic {

      .card-a-image {

        object-fit: contain;

      }

      }

      .rings {

      }

      .rings.r1 {

      }

      .fade-c {

        en: {
          page_title: "Welcome to Lumno! | Lumno Focused Search & New Tab",
          title_welcome: "Welcome to",
          subtitle: "An open-source browser extension for focused search and a minimalist new tab.",
          shortcut_press: "Press",
          shortcut_invoke: "to launch",
          language_select_aria: "Language",
          language_system: "Follow browser language",
          language_zh_cn: "简体中文",

          language_zh_hk: "繁體中文",
          language_en: "English",
          join_discord: "Join Discord",
          go_settings: "View on GitHub",
          discord_aria: "Join Discord channel",
          settings_aria: "Open Lumno GitHub repository",
          feature_search_title: "Search Any Browser Page",
          feature_search_desc: "Bookmarks, history, open tabs, and most visited",
          feature_sitesearch_title: "Custom Site Search",
          feature_sitesearch_desc: "Built-in engines that support site-search queries",
          feature_newtab_title: "Minimalist New Tab",
          feature_newtab_desc: "Pin bookmarks plus recent or most-visited cards",
          feature_labs_title: "Labs Features",

          feature_labs_desc: "More features are on the way",

      };
      function setLanguageMenuOpen(open) {
        const languageMenu = document.getElementById("language-menu");
        const languageToggle = document.getElementById("language-toggle");
        if (!languageMenu || !languageToggle) return;
        languageMenu.hidden = !open;
        languageToggle.setAttribute("aria-expanded", open ? "true" : "false");
      }

      function updateLanguageOptionState(mode) {
        document.querySelectorAll("[data-lang-value]").forEach((node) => {
          const value = node.getAttribute("data-lang-value") || getSystemLocale();
          const isActive = value === mode;
          node.classList.toggle("is-active", isActive);
          node.setAttribute("aria-checked", isActive ? "true" : "false");
        });
      }

      function normalizeLocale(locale) {
        const raw = String(locale || "").trim();
        if (!raw) {
          return "en";
        }
        const lower = raw.toLowerCase();
        if (lower.startsWith("zh")) {
          if (lower.includes("hk")) {
            return "zh-TW";
          }
          if (lower.includes("tw") || lower.includes("mo") || lower.includes("hant")) {
            return "zh-TW";
          }
          return "zh-CN";
        }
        return "en";
      }

      function normalizeLanguageMode(mode) {
        const raw = String(mode || "").trim();
        if (!raw) return getSystemLocale();
        const lower = raw.toLowerCase();
        if (lower === "system") return getSystemLocale();
        if (lower === "en" || lower.startsWith("en-") || lower.startsWith("en_")) return "en";
        if (lower === "zh-hk" || lower === "zh_hk") return "zh-TW";
        if (lower === "zh-tw" || lower === "zh_tw" || lower === "zh-mo" || lower === "zh_mo" || lower.includes("hant")) {
          return "zh-TW";
        }
        if (lower === "zh-cn" || lower === "zh_cn" || lower === "zh-hans" || lower === "zh_hans" || lower.startsWith("zh")) {
          return "zh-CN";
        }
        return getSystemLocale();
      }

      function getSystemLocale() {
        const firstPreferred = Array.isArray(navigator.languages) && navigator.languages.length ? navigator.languages[0] : navigator.language;
        return normalizeLocale(firstPreferred || "en");
      }

      function getMessage(locale, key) {
        return (
          (I18N_MESSAGES[locale] && I18N_MESSAGES[locale][key]) ||
          (I18N_MESSAGES[FALLBACK_LOCALE] && I18N_MESSAGES[FALLBACK_LOCALE][key]) ||
          key
        );
      }

      function applyI18n(locale) {
        const resolvedLocale = I18N_MESSAGES[locale] ? locale : FALLBACK_LOCALE;
        document.documentElement.lang = resolvedLocale;
        document.body.classList.toggle("is-locale-en", resolvedLocale === "en");
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          if (!key) return;
          const value = getMessage(resolvedLocale, key);
          if (node.tagName === "TITLE") {
            document.title = value;
            return;
          }
          node.textContent = value;
        });
        document.querySelectorAll("[data-i18n-aria-label]").forEach((node) => {
          const key = node.getAttribute("data-i18n-aria-label");
          if (!key) return;
          node.setAttribute("aria-label", getMessage(resolvedLocale, key));
        });
        document.querySelectorAll("[data-i18n-alt]").forEach((node) => {
          const key = node.getAttribute("data-i18n-alt");
          if (!key) return;
          node.setAttribute("alt", getMessage(resolvedLocale, key));
        });
      }

      function applyLanguageMode(mode, options) {
        const normalizedMode = normalizeLanguageMode(mode);
        applyI18n(normalizedMode);
        updateLanguageOptionState(normalizedMode);
        if (options && options.persist) {
          localStorage.setItem(LANGUAGE_STORAGE_KEY, normalizedMode);
        }
      }

      document.addEventListener("dragstart", (event) => {
        if (event.target instanceof HTMLImageElement && event.target.classList.contains("mark-svg")) {
          event.preventDefault();
        }
      });

      const languageToggle = document.getElementById("language-toggle");
      const languageMenu = document.getElementById("language-menu");
      if (languageToggle && languageMenu) {
        languageToggle.addEventListener("click", (event) => {
          event.stopPropagation();
          setLanguageMenuOpen(languageMenu.hidden);
        });
        languageMenu.addEventListener("click", (event) => {
          const target = event.target instanceof HTMLElement ? event.target.closest("[data-lang-value]") : null;
          if (!target) return;
          const next = target.getAttribute("data-lang-value") || getSystemLocale();
          applyLanguageMode(next, { persist: true });
          setLanguageMenuOpen(false);
        });
        document.addEventListener("click", (event) => {
          if (!(event.target instanceof Node)) return;
          if (!languageMenu.contains(event.target) && !languageToggle.contains(event.target)) {
            setLanguageMenuOpen(false);
          }
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            setLanguageMenuOpen(false);
          }
        });
      }
      applyLanguageMode(localStorage.getItem(LANGUAGE_STORAGE_KEY) || getSystemLocale());

      const modifierKeyEl = document.getElementById("shortcut-modifier-key");
      if (modifierKeyEl) {
        const isWindows = navigator.userAgent.toLowerCase().includes("windows");
        modifierKeyEl.textContent = isWindows ? "Ctrl" : "⌘";
      }

      const rightPaneEl = document.querySelector(".right-pane");
      const cards = Array.from(document.querySelectorAll(".feature-card"));
      if (rightPaneEl && cards.length > 1) {
        const RIGHT_AUTOPLAY_INTERVAL_MS = 1500;
        const LEFT_ENTER_TOTAL_MS = 1000;
        let activeIndex = 0;
        let autoplayTimer = null;
        let paused = false;

        const renderActiveCard = () => {
          cards.forEach((card, index) => {
            card.classList.toggle("is-active", index === activeIndex);
          });
        };

        const nextCard = () => {
          if (paused) return;
          activeIndex = (activeIndex + 1) % cards.length;
          renderActiveCard();
        };

        const startAutoplay = () => {
          if (autoplayTimer) clearInterval(autoplayTimer);
          autoplayTimer = setInterval(nextCard, RIGHT_AUTOPLAY_INTERVAL_MS);
        };

        cards.forEach((card) => card.classList.remove("is-active"));

        window.setTimeout(() => {
          document.body.classList.add("is-entered");
          renderActiveCard();
          startAutoplay();
        }, LEFT_ENTER_TOTAL_MS);

        rightPaneEl.addEventListener("mouseenter", () => {
          paused = true;
          rightPaneEl.classList.add("is-manual-hover");
        });

        rightPaneEl.addEventListener("mouseleave", () => {
          paused = false;
          rightPaneEl.classList.remove("is-manual-hover");
        });
      }

    </script>
